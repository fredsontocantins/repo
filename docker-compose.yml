version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: voluntarios_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voluntarios
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voluntarios_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/voluntarios
      # Obrigatório — defina em .env (copie de .env.example). Nunca commitar.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET é obrigatório. Gere com: openssl rand -base64 48}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://voluntarios_api:3001
        NEXT_PUBLIC_API_URL: http://voluntarios_api:3001/api/v1
    container_name: voluntarios_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Usado pelo Next.js proxy server-side (rewrite) para alcançar o backend
      BACKEND_URL: http://voluntarios_api:3001
      # Mantido para compatibilidade com SSR direto
      NEXT_PUBLIC_API_URL: http://voluntarios_api:3001/api/v1
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
